spring.application.name=backend

# Configuração Dinâmica do Banco de Dados
# Se as variáveis PG_HOST, etc existirem (Railway), ele as usa.
# Se não existirem, ele usa os valores após os dois pontos (localhost).
spring.datasource.url=jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DATABASE:portifolioBD}
spring.datasource.username=${PG_USER:postgres}
spring.datasource.password=${PG_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:viniciusvilanova7@gmail.com}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Força o perfil padrão caso não haja um definido
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}